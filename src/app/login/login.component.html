<div class="w-full max-w-md mx-auto mt-12 md:mt-20">
  <div class="bg-slate-800/80 rounded-xl border border-slate-600/80 p-8 shadow-sm">
    <h1 class="text-xl font-semibold text-emerald-400 mb-1">Sign in</h1>
    <p class="text-slate-400 text-sm mb-6">Terminal reports — Dynamic Divine Academy</p>

    @if (errorMessage) {
      <div
        role="alert"
        class="mb-4 px-3 py-2.5 rounded-lg bg-red-950/50 border border-red-500/40 text-red-300 text-sm">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="login-username" class="block text-xs text-slate-400 mb-1.5">Email</label>
        <input
          id="login-username"
          type="email"
          name="username"
          autocomplete="username"
          [(ngModel)]="username"
          (ngModelChange)="clearError()"
          class="input-field w-full bg-slate-700/80 border border-slate-600 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/60 focus:border-emerald-500 outline-none transition"
          placeholder="you@school.com" />
      </div>
      <div>
        <label for="login-password" class="block text-xs text-slate-400 mb-1.5">Password</label>
        <input
          id="login-password"
          type="password"
          name="password"
          autocomplete="current-password"
          [(ngModel)]="password"
          (ngModelChange)="clearError()"
          class="input-field w-full bg-slate-700/80 border border-slate-600 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/60 focus:border-emerald-500 outline-none transition"
          placeholder="••••••••" />
      </div>
      <button
        type="submit"
        class="w-full px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-medium text-sm shadow-sm transition">
        Log in
      </button>
    </form>
  </div>
</div>
