<div class="flex min-h-[calc(100vh-3rem)] w-full flex-col">
  <div class="flex flex-1 flex-col items-stretch justify-start pt-12 md:pt-20">
    <div class="w-full max-w-md mx-auto">
  <div class="bg-slate-800/80 rounded-xl border border-slate-600/80 p-8 shadow-sm">
    <h1 class="text-xl font-semibold text-emerald-400 mb-1">Sign in</h1>
    <p class="text-slate-400 text-sm mb-6">Terminal reports — Dynamic Divine Academy</p>

    @if (errorMessage) {
      <div
        role="alert"
        class="mb-4 px-3 py-2.5 rounded-lg bg-red-950/50 border border-red-500/40 text-red-300 text-sm">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="login-username" class="block text-xs text-slate-400 mb-1.5">Email</label>
        <input
          id="login-username"
          type="email"
          name="username"
          autocomplete="username"
          [(ngModel)]="username"
          (ngModelChange)="clearError()"
          class="input-field w-full bg-slate-700/80 border border-slate-600 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/60 focus:border-emerald-500 outline-none transition"
          placeholder="you@school.com" />
      </div>
      <div>
        <label for="login-password" class="block text-xs text-slate-400 mb-1.5">Password</label>
        <input
          id="login-password"
          type="password"
          name="password"
          autocomplete="current-password"
          [(ngModel)]="password"
          (ngModelChange)="clearError()"
          class="input-field w-full bg-slate-700/80 border border-slate-600 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/60 focus:border-emerald-500 outline-none transition"
          placeholder="••••••••" />
      </div>
      <button
        type="submit"
        class="w-full px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-medium text-sm shadow-sm transition">
        Log in
      </button>
    </form>
  </div>
    </div>
  </div>

  <footer class="mt-auto w-full max-w-md mx-auto border-t border-slate-600/60 pt-6 pb-3">
    <div class="flex flex-row flex-wrap items-center gap-x-4 gap-y-3">
      <img
        src="beetle-tech-logo.png"
        alt="Beetle Tech"
        class="h-10 w-auto shrink-0 object-contain"
        width="40"
        height="40" />
      <span class="shrink-0 text-sm font-semibold text-teal-400/90">Beetle Tech</span>
      <a
        href="https://wa.me/233548670632"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex shrink-0 items-center gap-2 text-xs text-slate-300 transition hover:text-[#25D366]"
        aria-label="WhatsApp +233548670632">
        <i class="fa-brands fa-whatsapp text-lg text-[#25D366]" aria-hidden="true"></i>
        <span class="tabular-nums">+233548670632</span>
      </a>
      <a
        href="tel:+233548670632"
        class="inline-flex shrink-0 items-center gap-2 text-xs text-slate-300 transition hover:text-teal-400"
        aria-label="Call +233548670632">
        <i class="fa-solid fa-phone text-sm text-slate-400" aria-hidden="true"></i>
        <span class="tabular-nums">+233548670632</span>
      </a>
    </div>
    <p class="mt-4 text-center text-[11px] text-slate-500">© 2026 Beetle Tech. All rights reserved.</p>
  </footer>
</div>
